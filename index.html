<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Campero Course Platform — Demo</title>
<style>
  body { margin:0; font-family:'Segoe UI',Arial,Helvetica,sans-serif; color:#5E2A2B;
    background:radial-gradient(circle at 30% 0%, #fff6ec 0%, #f3e7d6 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:32px; }
  .box { max-width:440px; }
  .spin { width:42px; height:42px; margin:0 auto 18px; border:4px solid rgba(255,77,0,.2);
    border-top-color:#FF4D00; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  h1 { font-size:20px; text-transform:uppercase; letter-spacing:.5px; margin:0 0 6px; }
  p { font-size:14px; line-height:1.5; color:rgba(94,42,43,.8); margin:0; }
  a { color:#FF4D00; font-weight:700; }
</style>
</head>
<body>
  <div class="box">
    <div class="spin" aria-hidden="true"></div>
    <h1>Loading the Campero demo…</h1>
    <p>Setting up a sample course and opening the Builder.<br>
       If it doesn’t open automatically, <a href="Course Builder.dc.html">click here</a>.</p>
  </div>

<script>
// ── Sample course (showcases the restaurant-native blocks + gamification) ──
function svg(w,h,bg,fg,label){
  return 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'"><rect width="'+w+'" height="'+h+'" fill="'+bg+'"/><text x="50%" y="50%" font-family="Arial" font-size="26" font-weight="bold" fill="'+fg+'" text-anchor="middle" dominant-baseline="middle">'+label+'</text></svg>');
}
var cleanImg = svg(400,250,'#B4BD00','#ffffff','CLEAN STATION');
var dirtyImg = svg(400,250,'#FF4D00','#ffffff','NEEDS ATTENTION');
var dishImg  = svg(400,220,'#FF8300','#ffffff','CAMPERO CLASSIC');
var kitImg   = svg(440,280,'#EADfce','#8a7a5a','KITCHEN — FIND 3 ISSUES');

function buildCourse(){
  var sections = [ {id:'sec_start',title:'Getting Started'}, {id:'sec_safety',title:'Food Safety'} ];
  var modules = [
    { title:'Welcome to Campero', title_es:'Bienvenido a Campero', icon:'🐔', color:'#FF4D00', duration:'8 min', sectionId:'sec_start', blocks:[
      { id:'m0b0', type:'hero', content:{ title:'Welcome to the Family, [name]!', body:'In this lesson you’ll learn our signature build and why temperature matters.' } },
      { id:'m0b1', type:'objectives', content:{ items:['Build the Campero Classic to spec','Hold product at a safe temperature','Know your station before a rush'] } },
      { id:'m0b2', type:'recipe', content:{ dish:'Campero Classic Sandwich', photo:dishImg,
        steps:['Toast the brioche bun','Place the hand-breaded fillet','Add lettuce, tomato, and signature mayo','Wrap and serve within 20 minutes'],
        specs:[{label:'Portion',value:'1 fillet'},{label:'Hold temp',value:'165°F'},{label:'Prep time',value:'90 sec'},{label:'Hold time',value:'20 min'}] } },
      { id:'m0b3', type:'quiz', content:{ qType:'mc', question:'What is the safe hold temperature for fried chicken?', options:['165°F','120°F','100°F','200°F'], correct:0 } }
    ]},
    { title:'Food Safety on the Line', title_es:'Seguridad alimentaria', icon:'🧼', color:'#B4BD00', duration:'10 min', sectionId:'sec_safety', blocks:[
      { id:'m1b0', type:'hero', content:{ title:'Keep It Clean, Keep It Safe', body:'Spot problems fast and acknowledge the standard you’re held to.' } },
      { id:'m1b1', type:'compare', content:{ leftImage:cleanImg, rightImage:dirtyImg, leftLabel:'Correct', rightLabel:'Wrong', caption:'Drag the slider — notice the labeled containers and clear surfaces on the left.' } },
      { id:'m1b2', type:'findissues', content:{ image:kitImg, prompt:'Tap every food-safety issue you can spot.', issues:[
        {x:25,y:35,label:'1',detail:'Raw product stored above ready-to-eat food.'},
        {x:60,y:60,label:'2',detail:'No glove on the prep hand.'},
        {x:82,y:30,label:'3',detail:'Chemical spray bottle next to open food.'} ] } },
      { id:'m1b3', type:'ack', content:{ statement:'I have read and understand the Pollo Campero food-safety standards and agree to follow them on every shift.' } }
    ]},
    { title:'Skill Check: Frying Station', title_es:'Verificación: Estación de fritura', icon:'🏅', color:'#512E91', duration:'6 min', sectionId:'sec_safety', blocks:[
      { id:'m2b0', type:'hero', content:{ title:'Prove It on the Line', body:'A manager confirms you can run the fryer to standard.' } },
      { id:'m2b1', type:'process', content:{ items:[
        {a:'Check & log oil temp', b:'Confirm 350°F before the first basket.'},
        {a:'Load to portion', b:'Never overfill the basket.'},
        {a:'Probe before plating', b:'Internal temp must reach 165°F.'} ] } },
      { id:'m2b2', type:'signoff', content:{ skillTitle:'Fry Station to Temp', requireManagerName:true, criteria:[
        {text:'Oil temperature checked and logged at 350°F'},
        {text:'Basket loaded to correct portion, not overfilled'},
        {text:'Internal temp probed to 165°F before plating'},
        {text:'Station cleaned and timer reset for the next batch'} ] } }
    ]}
  ];
  var gamification = { enabled:true, badges:[
    {id:'b_start',name:'First Shift',icon:'🐣',trigger:'lessons',n:1},
    {id:'b_roll',name:'On a Roll',icon:'🔥',trigger:'streak',n:3},
    {id:'b_quiz',name:'Quiz Champ',icon:'🧠',trigger:'assessment',n:0},
    {id:'b_pro',name:'Campero Pro',icon:'🏆',trigger:'course',n:0}
  ]};
  var assessQuestions = [
    { qType:'mc', question:'How long can the Campero Classic be held before serving?', options:['20 minutes','2 hours','All day','5 minutes'], correct:0 },
    { qType:'tf', question:'You should probe fried chicken to 165°F before plating.', correct:0 }
  ];
  var theme = { accent:'#FF4D00', headingFont:'Exo' };
  return { sections:sections, modules:modules, gamification:gamification, assessQuestions:assessQuestions, theme:theme, welcome:{} };
}

function seed(){
  var c = buildCourse();
  var config = {
    courseTitle:'Campero Team Training (Demo)', modules:c.modules, sections:c.sections,
    branching:{ lang:true, store:false, role:false }, roles:['Manager','Cashier','Cook'],
    assessEnabled:true, passingScore:80, assessBank:false, assessDrawN:5, assessQuestions:c.assessQuestions,
    pollitoEnabled:true, readAloud:true, gamification:c.gamification, scormVersion:'xapi',
    welcome:c.welcome, theme:c.theme, mediaLibrary:[], savedAt:new Date().toISOString()
  };
  localStorage.setItem('campero_builder_config', JSON.stringify(config));
  var course = {
    id:'demo_campero', courseTitle:config.courseTitle, author:'Demo Author', icon:'🐔', color:'#FF4D00',
    modules:c.modules, sections:c.sections, roles:config.roles,
    langBranch:true, storeBranch:false, roleBranch:false,
    assessEnabled:true, passingScore:80, assessBank:false, assessDrawN:5,
    pollitoEnabled:true, readAloud:true, gamification:c.gamification, scormVersion:'xapi',
    welcome:c.welcome, assessQuestions:c.assessQuestions, theme:c.theme, mediaLibrary:[], savedAt:new Date().toISOString()
  };
  localStorage.setItem('campero_course_library', JSON.stringify([course]));
  localStorage.setItem('campero_author','Demo Author');
}

try {
  // Seed the sample course only on a fresh visit — never clobber work already in this browser.
  var lib = localStorage.getItem('campero_course_library');
  if (!lib || lib === '[]') seed();
  // Turn on the in-app demo guide popup (Builder + Player). Cleared by "Reset demo".
  localStorage.setItem('campero_demo_mode','1');
} catch(e){}
location.replace('Course Builder.dc.html');
</script>
</body>
</html>
